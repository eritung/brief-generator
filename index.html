<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>製作說明信產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ─── CSS Variables ─────────────────────────────── */
  :root {
    --bg:         #f5f3ef;
    --surface:    #faf9f6;
    --surface2:   #f0ede7;
    --border:     #ddd9d2;
    --border-dark:#c4bfb6;
    --text:       #2c2a26;
    --text-mid:   #6b6660;
    --text-light: #9e9890;
    --accent:     #8b7355;
    --accent-soft:#c4a882;
    --accent-bg:  #f2ebe0;
    --red:        #b85c4a;
    --font-serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
    --font-sans:  'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    font-weight: 300;
  }

  /* ─── Header ─────────────────────────────────────── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .app-header h1 {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: var(--text);
  }
  .app-header span {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ─── Layout ─────────────────────────────────────── */
  .app-body {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 61px);
  }

  /* ─── Form Panel ─────────────────────────────────── */
  .form-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    overflow-y: auto;
    max-height: calc(100vh - 61px);
    position: sticky;
    top: 0;
  }
  .form-panel h2 {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .field-group {
    margin-bottom: 20px;
  }
  .field-group label {
    display: block;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--text-mid);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field-group input[type="text"],
  .field-group input[type="date"],
  .field-group input[type="time"],
  .field-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 9px 12px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .field-group input:focus,
  .field-group textarea:focus {
    border-color: var(--accent-soft);
    background: var(--surface);
  }
  .field-group textarea {
    resize: vertical;
    min-height: 72px;
    line-height: 1.6;
  }

  .inline-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Material URL Row */
  .material-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .material-sub-label {
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin-top: 2px;
    margin-bottom: 2px;
  }

  /* ─── Image paste zone ────────────────────────────── */
  .paste-zone {
    border: 1px dashed var(--border-dark);
    border-radius: 2px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    background: var(--surface2);
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  .paste-zone:hover, .paste-zone.active {
    border-color: var(--accent-soft);
    background: var(--accent-bg);
  }
  .paste-zone .paste-hint {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.08em;
  }
  .paste-zone .paste-icon {
    font-size: 20px;
    opacity: 0.4;
  }
  .paste-zone img {
    max-width: 100%;
    max-height: 120px;
    border-radius: 2px;
    object-fit: contain;
  }
  .paste-zone .remove-img {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 2px;
    width: 20px;
    height: 20px;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .paste-zone:hover .remove-img {
    opacity: 1;
  }

  /* ─── Divider ─────────────────────────────────────── */
  .field-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* ─── Preview Panel ───────────────────────────────── */
  .preview-panel {
    padding: 32px 40px;
    overflow-y: auto;
  }
  .preview-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .preview-panel-header h2 {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .copy-buttons {
    display: flex;
    gap: 8px;
  }
  .btn {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 2px;
    border: 1px solid var(--border-dark);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-primary:hover {
    background: #7a6347;
    border-color: #7a6347;
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--text-mid);
  }
  .btn-secondary:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent-soft);
  }
  .btn.copied {
    background: #5a7a5a;
    border-color: #5a7a5a;
    color: white;
  }

  /* ─── Email Frame ─────────────────────────────────── */
  .email-frame {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    max-width: 640px;
    margin: 0 auto;
  }
  .email-frame-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .email-frame-bar .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-dark);
  }
  .email-frame-bar .dot:first-child { background: #e8a49a; }
  .email-frame-bar .dot:nth-child(2) { background: #e0c98a; }
  .email-frame-bar .dot:nth-child(3) { background: #9ec49e; }
  .email-content {
    padding: 0;
  }
  #email-preview {
    width: 100%;
    border: none;
    display: block;
    min-height: 400px;
  }

  /* ─── Toast ───────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: var(--surface);
    padding: 10px 24px;
    border-radius: 2px;
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Split Date Input ───────────────────────────── */
  .date-input-group {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 10px;
    transition: border-color 0.2s, background 0.2s;
  }
  .date-input-group:focus-within {
    border-color: var(--accent-soft);
    background: var(--surface);
  }
  .date-input-group .date-sep {
    color: var(--text-light);
    font-size: 13px;
    user-select: none;
  }
  .date-input-group input {
    background: transparent !important;
    border: none !important;
    padding: 9px 0 !important;
    outline: none;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 300;
    color: var(--text);
    text-align: center;
  }
  .date-input-group input.date-y { width: 44px; }
  .date-input-group input.date-m { width: 26px; }
  .date-input-group input.date-d { width: 26px; }
  .date-input-group input::placeholder { color: var(--text-light); }

  /* ─── Scrollbar ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>HTML Email 產生器</h1>
  <span>Japanese Minimal Edition</span>
</header>

<div class="app-body">

  <!-- ── Form Panel ── -->
  <div class="form-panel">
    <h2>填寫欄位</h2>

    <!-- 客戶名稱 -->
    <div class="field-group">
      <label>客戶名稱</label>
      <input type="text" id="f-client" placeholder="例：ABC 品牌" oninput="render()">
    </div>

    <!-- 產品名稱 -->
    <div class="field-group">
      <label>產品名稱</label>
      <input type="text" id="f-product" placeholder="例：2024 春夏系列" oninput="render()">
    </div>

    <!-- 製作內容 -->
    <div class="field-group">
      <label>製作內容</label>
      <textarea id="f-content" placeholder="例：形象影片 x1、社群貼文 x5…" oninput="render()"></textarea>
    </div>

    <hr class="field-divider">

    <!-- 提供時間 -->
    <div class="field-group">
      <label>提供時間</label>
      <div class="inline-row">
        <div class="date-input-group">
          <input type="text" inputmode="numeric" maxlength="4" placeholder="YYYY" class="date-y" id="f-deliver-y"
            oninput="dateAutoAdvance(this,'f-deliver-m')">
          <span class="date-sep">/</span>
          <input type="text" inputmode="numeric" maxlength="2" placeholder="MM" class="date-m" id="f-deliver-m"
            oninput="dateAutoAdvance(this,'f-deliver-d')">
          <span class="date-sep">/</span>
          <input type="text" inputmode="numeric" maxlength="2" placeholder="DD" class="date-d" id="f-deliver-d"
            oninput="render()">
        </div>
        <input type="time" id="f-deliver-time" oninput="render()">
      </div>
    </div>

    <!-- 素材 -->
    <div class="field-group">
      <label>素材連結</label>
      <div class="material-row">
        <input type="text" id="f-material-url" placeholder="https://..." oninput="render()">
        <p class="material-sub-label">按鈕文字（選填，預設「查看素材」）</p>
        <input type="text" id="f-material-label" placeholder="查看素材" oninput="render()">
      </div>
    </div>

    <hr class="field-divider">

    <!-- Sales -->
    <div class="field-group">
      <label>Sales</label>
      <input type="text" id="f-sales" placeholder="例：王小明" oninput="render()">
    </div>

    <!-- 上線時程 -->
    <div class="field-group">
      <label>上線時程</label>
      <div class="inline-row" style="margin-bottom:8px">
        <div class="date-input-group">
          <input type="text" inputmode="numeric" maxlength="4" placeholder="YYYY" class="date-y" id="f-launch-y"
            oninput="dateAutoAdvance(this,'f-launch-m')">
          <span class="date-sep">/</span>
          <input type="text" inputmode="numeric" maxlength="2" placeholder="MM" class="date-m" id="f-launch-m"
            oninput="dateAutoAdvance(this,'f-launch-d')">
          <span class="date-sep">/</span>
          <input type="text" inputmode="numeric" maxlength="2" placeholder="DD" class="date-d" id="f-launch-d"
            oninput="render()">
        </div>
        <input type="text" id="f-launch-note" placeholder="備註（例：週三）" oninput="render()">
      </div>
      <!-- 圖片貼上區 -->
      <div class="paste-zone" id="paste-zone" tabindex="0"
        title="點擊後按 Cmd+V / Ctrl+V 貼上圖片">
        <span class="paste-icon">🖼</span>
        <span class="paste-hint">點擊此區域，再按 Cmd+V / Ctrl+V 貼上圖片</span>
        <button class="remove-img" id="remove-img-btn" onclick="removeImage(event)" title="移除圖片">✕</button>
      </div>
    </div>

  </div><!-- /form-panel -->

  <!-- ── Preview Panel ── -->
  <div class="preview-panel">
    <div class="preview-panel-header">
      <h2>Email 預覽</h2>
      <div class="copy-buttons">
        <button class="btn btn-secondary" onclick="copyPlainText(this)">
          <span>✦</span> 複製純文字
        </button>
        <button class="btn btn-primary" onclick="copyHTML(this)">
          <span>⊡</span> 複製 HTML
        </button>
      </div>
    </div>

    <div class="email-frame">
      <div class="email-frame-bar">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="email-content">
        <iframe id="email-preview" scrolling="no"></iframe>
      </div>
    </div>
  </div>

</div><!-- /app-body -->

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   Image Paste Logic
══════════════════════════════════════════════ */
let pastedImageDataURL = null;

const pasteZone = document.getElementById('paste-zone');
const removeBtn = document.getElementById('remove-img-btn');

pasteZone.addEventListener('focus', () => pasteZone.classList.add('active'));
pasteZone.addEventListener('blur',  () => pasteZone.classList.remove('active'));

document.addEventListener('paste', function(e) {
  // Only handle if paste zone is focused or no input is focused
  const active = document.activeElement;
  const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
  if (isInput && active !== pasteZone) return;

  const items = e.clipboardData?.items;
  if (!items) return;
  for (let item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = function(ev) {
        pastedImageDataURL = ev.target.result;
        showPastedImage(pastedImageDataURL);
        render();
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

function showPastedImage(src) {
  pasteZone.innerHTML = `
    <img src="${src}" alt="上線時程圖片">
    <button class="remove-img" id="remove-img-btn" onclick="removeImage(event)" title="移除圖片">✕</button>
  `;
}

function removeImage(e) {
  e.stopPropagation();
  pastedImageDataURL = null;
  pasteZone.innerHTML = `
    <span class="paste-icon">🖼</span>
    <span class="paste-hint">點擊此區域，再按 Cmd+V / Ctrl+V 貼上圖片</span>
    <button class="remove-img" id="remove-img-btn" onclick="removeImage(event)" title="移除圖片">✕</button>
  `;
  render();
}

/* ══════════════════════════════════════════════
   Date Auto-Advance
══════════════════════════════════════════════ */
function dateAutoAdvance(el, nextId) {
  // Only advance on digit input, not backspace/delete
  if (el.value.length >= parseInt(el.maxLength)) {
    const next = document.getElementById(nextId);
    if (next) { next.focus(); next.select(); }
  }
  render();
}

function getDateStr(yId, mId, dId) {
  const y = v(yId), m = v(mId), d = v(dId);
  if (!y && !m && !d) return '';
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

/* ══════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════ */
function v(id) {
  return (document.getElementById(id)?.value || '').trim();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const wd = days[d.getDay()];
  return `${y}/${m}/${day}（${wd}）`;
}

function formatTime(timeStr) {
  if (!timeStr) return '';
  return timeStr;
}

/* ══════════════════════════════════════════════
   Email HTML Template
   All styles are inline for Gmail compatibility
══════════════════════════════════════════════ */
function buildEmailHTML(data) {
  const {
    client, product, content,
    deliverDate, deliverTime,
    materialURL, materialLabel,
    sales,
    launchDate, launchNote,
    imageDataURL
  } = data;

  const showDeliver = deliverDate || deliverTime;
  const showMaterial = materialURL;
  const showLaunch = launchDate || launchNote || imageDataURL;

  /* Row builder */
  function row(label, valueHTML) {
    return `
    <tr>
      <td style="padding:14px 0;border-bottom:1px solid #e8e4de;vertical-align:top;width:130px;min-width:130px;">
        <span style="font-family:'Noto Serif JP',Georgia,serif;font-size:11px;font-weight:400;letter-spacing:0.12em;color:#9e9890;text-transform:uppercase;">${label}</span>
      </td>
      <td style="padding:14px 0 14px 20px;border-bottom:1px solid #e8e4de;vertical-align:top;">
        ${valueHTML}
      </td>
    </tr>`;
  }

  const rows = [];

  if (client)
    rows.push(row('客戶名稱',
      `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.7;">${esc(client)}</span>`));

  if (product)
    rows.push(row('產品名稱',
      `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.7;">${esc(product)}</span>`));

  if (content)
    rows.push(row('製作說明',
      `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.8;white-space:pre-wrap;">${esc(content)}</span>`));

  if (showDeliver) {
    let dt = '';
    if (deliverDate) dt += formatDate(deliverDate);
    if (deliverTime) dt += (dt ? '&nbsp; ' : '') + esc(deliverTime);
    rows.push(row('提供時間',
      `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.7;">${dt}</span>`));
  }

  if (showMaterial) {
    const btnLabel = materialLabel || '查看素材';
    rows.push(row('素材',
      `<a href="${esc(materialURL)}" target="_blank" style="display:inline-block;background:#8b7355;color:#ffffff;font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.1em;text-decoration:none;padding:9px 22px;border-radius:2px;">${esc(btnLabel)}</a>`));
  }

  if (sales)
    rows.push(row('Sales',
      `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.7;">${esc(sales)}</span>`));

  if (showLaunch) {
    let launchContent = '';
    let launchText = '';
    if (launchDate) launchText += formatDate(launchDate);
    if (launchNote) launchText += (launchText ? '&nbsp; ' : '') + esc(launchNote);
    if (launchText) launchContent += `<span style="font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#2c2a26;line-height:1.7;display:block;margin-bottom:${imageDataURL?'12px':'0'};">${launchText}</span>`;
    if (imageDataURL) launchContent += `<img src="${imageDataURL}" alt="上線時程" style="max-width:100%;max-height:300px;display:block;border-radius:2px;border:1px solid #e8e4de;">`;
    rows.push(row('上線時程', launchContent));
  }

  const tableBody = rows.join('');

  return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#f5f3ef;font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f3ef;">
  <tr>
    <td align="center" style="padding:40px 20px;">

      <!-- Card -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#ffffff;border:1px solid #ddd9d2;border-radius:2px;">

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════
   Plain Text Template
══════════════════════════════════════════════ */
function buildPlainText(data) {
  const {
    client, product, content,
    deliverDate, deliverTime,
    materialURL, materialLabel,
    sales, launchDate, launchNote
  } = data;

  const lines = [];
  lines.push('═══════════════════════════════');
  lines.push('  Project Brief');
  lines.push('═══════════════════════════════');
  if (client)       lines.push(`客戶名稱　　${client}`);
  if (product)      lines.push(`產品名稱　　${product}`);
  if (content)      lines.push(`製作說明　　${content}`);
  if (deliverDate || deliverTime) {
    let dt = '';
    if (deliverDate) dt += formatDate(deliverDate).replace(/[（）]/g, v => v === '（' ? '(' : ')');
    if (deliverTime) dt += (dt ? ' ' : '') + deliverTime;
    lines.push(`提供時間　　${dt}`);
  }
  if (materialURL) {
    lines.push(`素材　　　　${materialLabel || '查看素材'}`);
    lines.push(`　　　　　　${materialURL}`);
  }
  if (sales)        lines.push(`Sales　　　 ${sales}`);
  if (launchDate || launchNote) {
    let lt = '';
    if (launchDate) lt += formatDate(launchDate).replace(/[（）]/g, v => v === '（' ? '(' : ')');
    if (launchNote) lt += (lt ? ' ' : '') + launchNote;
    lines.push(`上線時程　　${lt}`);
  }
  lines.push('═══════════════════════════════');
  return lines.join('\n');
}

/* ══════════════════════════════════════════════
   Render
══════════════════════════════════════════════ */
function getData() {
  return {
    client:       v('f-client'),
    product:      v('f-product'),
    content:      v('f-content'),
    deliverDate:  getDateStr('f-deliver-y','f-deliver-m','f-deliver-d'),
    deliverTime:  v('f-deliver-time'),
    materialURL:  v('f-material-url'),
    materialLabel:v('f-material-label'),
    sales:        v('f-sales'),
    launchDate:   getDateStr('f-launch-y','f-launch-m','f-launch-d'),
    launchNote:   v('f-launch-note'),
    imageDataURL: pastedImageDataURL
  };
}

function render() {
  const data = getData();
  const html = buildEmailHTML(data);

  const iframe = document.getElementById('email-preview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();

  // Auto-resize iframe
  setTimeout(() => {
    try {
      const body = iframe.contentDocument.body;
      iframe.style.height = (body.scrollHeight + 20) + 'px';
    } catch(e) {}
  }, 100);
}

/* ══════════════════════════════════════════════
   Copy Functions
══════════════════════════════════════════════ */
async function copyHTML(btn) {
  const html = buildEmailHTML(getData());
  try {
    await navigator.clipboard.writeText(html);
    flashBtn(btn, '✓ 已複製 HTML');
    showToast('HTML 已複製至剪貼簿，可直接貼入 Gmail');
  } catch(e) {
    fallbackCopy(html);
    showToast('請手動複製（Cmd/Ctrl+A 全選後 Cmd/Ctrl+C）');
  }
}

async function copyPlainText(btn) {
  const text = buildPlainText(getData());
  try {
    await navigator.clipboard.writeText(text);
    flashBtn(btn, '✓ 已複製文字');
    showToast('純文字已複製至剪貼簿');
  } catch(e) {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function flashBtn(btn, label) {
  const orig = btn.innerHTML;
  btn.innerHTML = label;
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = orig;
    btn.classList.remove('copied');
  }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ══════════════════════════════════════════════
   Init
══════════════════════════════════════════════ */
render();
